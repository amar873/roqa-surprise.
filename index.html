<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Code Animation - Roqa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .text-container {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055;
            opacity: 0;
            animation: fadeIn 2s ease-in-out 3.5s forwards; 
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <div class="text-container">i love Roqa</div>
    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        resizeCanvas();

        let t = 0;
        const scale = 18; 

        function draw() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.strokeStyle = '#ff0055'; 
            ctx.lineWidth = 1.5;

            for (let i = 0; i < 3; i++) {
                if (t > Math.PI * 2) return; 

                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                ctx.beginPath();
                ctx.moveTo(cx, cy - 20); 
                ctx.lineTo(cx + x * scale, cy + y * scale); 
                ctx.stroke();

                t += 0.01; 
            }
            requestAnimationFrame(draw);
        }
        draw();

        window.addEventListener('resize', () => {
            resizeCanvas();
            t = 0; 
            draw();
        });
    </script>
</body>
</html>
